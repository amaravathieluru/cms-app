<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Principal Dashboard – CMS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #140608; --dark2: #1f0b0e; --maroon: #7a1a28; --gold: #c9a84c;
            --gold-light: #e8c96e; --text-muted: #b58a90; --white: #fff;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--dark); min-height: 100vh; color: var(--white); }
        .bg-pattern { position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 70% 50% at 90% 0%, rgba(201,168,76,0.07) 0%, transparent 55%),
            radial-gradient(ellipse 60% 40% at 10% 90%, rgba(122,26,40,0.2) 0%, transparent 60%),
            linear-gradient(160deg, #140608 0%, #1f0b0e 50%, #140608 100%); }
        .bg-grid { position: fixed; inset: 0; z-index: 0;
            background-image: linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
            background-size: 55px 55px; }

        nav { position: relative; z-index: 10; background: rgba(31,11,14,0.95); border-bottom: 1px solid rgba(201,168,76,0.12); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 68px; backdrop-filter: blur(20px); }
        .nav-brand { display: flex; align-items: center; gap: 14px; }
        .nav-icon { width: 40px; height: 40px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--gold-light); }
        .nav-subtitle { font-size: 0.72rem; color: var(--text-muted); }
        .nav-badge { background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.25); color: var(--gold); padding: 3px 10px; border-radius: 100px; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; margin-left: 10px; }
        .btn-logout { background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.25); color: #ff8a8a; padding: 8px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
        .btn-logout:hover { background: rgba(220,53,69,0.22); }

        .main { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

        /* Stats row */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 36px; animation: fadeUp 0.5s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,168,76,0.1); border-radius: 14px; padding: 22px 20px; }
        .stat-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        .stat-value { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold-light); }

        .page-header { margin-bottom: 24px; animation: fadeUp 0.5s 0.1s ease both; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
        .page-title span { color: var(--gold); }

        /* Search */
        .search-form { display: flex; gap: 10px; margin-bottom: 24px; animation: fadeUp 0.5s 0.15s ease both; }
        .search-input { flex: 1; max-width: 380px; padding: 11px 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.15); border-radius: 10px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
        .search-input::placeholder { color: rgba(255,255,255,0.2); }
        .search-input:focus { border-color: rgba(201,168,76,0.4); }
        .btn-search { padding: 11px 22px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; }
        .btn-search:hover { background: rgba(201,168,76,0.18); }

        /* Table */
        .table-wrap { background: rgba(255,255,255,0.02); border: 1px solid rgba(201,168,76,0.08); border-radius: 16px; overflow: hidden; animation: fadeUp 0.5s 0.2s ease both; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        thead tr { background: rgba(201,168,76,0.05); border-bottom: 1px solid rgba(201,168,76,0.1); }
        th { padding: 14px 16px; text-align: left; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); white-space: nowrap; }
        td { padding: 14px 16px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: top; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: rgba(201,168,76,0.02); }

        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.72rem; font-weight: 500; }
        .status-pending { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
        .status-approved { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
        .status-rejected { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }

        .action-form { display: flex; flex-direction: column; gap: 6px; min-width: 190px; }
        .remarks-input { padding: 7px 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; outline: none; width: 100%; transition: border-color 0.2s; }
        .remarks-input:focus { border-color: rgba(201,168,76,0.35); }
        .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-approve { padding: 6px 12px; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.22); color: #4ade80; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .btn-approve:hover { background: rgba(74,222,128,0.2); }
        .btn-reject { padding: 6px 12px; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.22); color: #f87171; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .btn-reject:hover { background: rgba(248,113,113,0.2); }
        .btn-delete { display: inline-block; margin-top: 4px; padding: 5px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); border-radius: 6px; font-size: 0.75rem; text-decoration: none; transition: all 0.2s; }
        .btn-delete:hover { border-color: rgba(248,113,113,0.3); color: #f87171; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

        @media(max-width:640px) { .stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-grid"></div>

<nav>
    <div class="nav-brand">
        <div class="nav-icon">👩‍💼</div>
        <div>
            <div class="nav-title" style="display:flex;align-items:center;gap:8px;">
                Principal Dashboard
                <span class="nav-badge">Admin</span>
            </div>
            <div class="nav-subtitle">Sir C R Reddy College for Women</div>
        </div>
    </div>
    <form action="/logout" method="post">
        <button type="submit" class="btn-logout">⬡ Logout</button>
    </form>
</nav>

<div class="main">

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">📋 Total Complaints</div>
            <div class="stat-value" th:text="${#lists.size(complaints)}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">✅ Approved</div>
            <div class="stat-value" th:text="${#lists.size(complaints.?[status eq 'Approved'])}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">⏳ Pending</div>
            <div class="stat-value" th:text="${#lists.size(complaints.?[status eq 'Pending'])}">0</div>
        </div>
    </div>

    <div class="page-header">
        <h1 class="page-title">Complaint <span>Monitoring</span></h1>
        <p style="color:var(--text-muted); font-size:0.85rem; margin-top:4px;">Institution-wide oversight of all student grievances</p>
    </div>

    <form action="/principalSearch" method="get" class="search-form">
        <input type="text" name="rollNumber" class="search-input" placeholder="🔍  Search by Roll Number...">
        <button type="submit" class="btn-search">Search</button>
    </form>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#ID</th>
                    <th>Student Name</th>
                    <th>Roll No.</th>
                    <th>Complaint</th>
                    <th>Status</th>
                    <th>Remarks</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${complaints}">
                    <td th:text="${c.id}" style="color:var(--text-muted); font-size:0.78rem;"></td>
                    <td th:text="${c.studentName}" style="font-weight:500;"></td>
                    <td th:text="${c.rollNumber}" style="font-family:monospace; color:var(--gold); font-size:0.82rem;"></td>
                    <td th:text="${c.complaintText}" style="max-width:220px; color:rgba(255,255,255,0.75);"></td>
                    <td>
                        <span th:classappend="${c.status == 'Approved'} ? 'status-approved' : (${c.status == 'Rejected'} ? 'status-rejected' : 'status-pending')"
                              class="status-badge" th:text="${c.status}"></span>
                    </td>
                    <td th:text="${c.remarks}" style="color:var(--text-muted); font-size:0.82rem;"></td>
                    <td>
                        <form th:action="@{/principalUpdate}" method="post" class="action-form">
                            <input type="hidden" name="id" th:value="${c.id}">
                            <input type="text" name="remarks" placeholder="Enter remarks..." class="remarks-input">
                            <div class="btn-row">
                                <button type="submit" name="status" value="Approved" class="btn-approve">✓ Approve</button>
                                <button type="submit" name="status" value="Rejected" class="btn-reject">✕ Reject</button>
                            </div>
                        </form>
                        <a th:href="@{/principalDelete/{id}(id=${c.id})}" class="btn-delete">🗑 Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(complaints)}">
                    <td colspan="7">
                        <div class="empty-state">
                            <div class="emoji">📭</div>
                            <div>No complaints found</div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
