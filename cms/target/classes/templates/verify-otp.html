<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify OTP – CMS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #0a1628; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; padding: 20px; }
        .bg-pattern { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 60%), linear-gradient(160deg, #0a1628 0%, #0d1e3a 50%, #0a1628 100%); }
        .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px); background-size: 60px 60px; }
        .card { position: relative; z-index: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2); border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; backdrop-filter: blur(20px); box-shadow: 0 30px 80px rgba(0,0,0,0.4); animation: fadeUp 0.6s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
        .icon-wrap { width: 56px; height: 56px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.28); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 20px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; text-align: center; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #8a9bb5; font-size: 0.84rem; margin-bottom: 12px; }
        .divider { width: 40px; height: 2px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); margin: 0 auto 28px; }
        .success-msg { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); color: #4ade80; border-radius: 10px; padding: 11px 14px; font-size: 0.82rem; margin-bottom: 20px; text-align: center; }
        .error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: #f87171; border-radius: 10px; padding: 11px 14px; font-size: 0.82rem; margin-bottom: 20px; text-align: center; }
        .email-display { background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.15); border-radius: 10px; padding: 10px 14px; margin-bottom: 24px; font-size: 0.82rem; color: #e8c96e; text-align: center; }

        /* OTP input boxes */
        .otp-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
        .otp-input { width: 52px; height: 58px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: #fff; font-size: 1.4rem; font-weight: 600; text-align: center; outline: none; transition: border-color 0.2s, box-shadow 0.2s; font-family: monospace; }
        .otp-input:focus { border-color: rgba(201,168,76,0.5); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }

        /* Hidden full OTP input */
        #otpHidden { display: none; }

        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #c9a84c, #e8c96e); border: none; border-radius: 10px; color: #1a1200; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(201,168,76,0.28); }
        .resend-link { display: block; text-align: center; margin-top: 14px; color: #8a9bb5; font-size: 0.82rem; text-decoration: none; }
        .resend-link:hover { color: #e8c96e; }
        .back-link { display: block; text-align: center; margin-top: 10px; color: #8a9bb5; font-size: 0.82rem; text-decoration: none; }
        .back-link:hover { color: #e8c96e; }

        /* Countdown timer */
        .timer { text-align: center; color: #fbbf24; font-size: 0.8rem; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-grid"></div>
<div class="card">
    <div class="icon-wrap">📨</div>
    <h2>Enter OTP</h2>
    <p class="subtitle">We sent a 6-digit code to your email</p>
    <div class="divider"></div>

    <div th:if="${success}" class="success-msg" th:text="${success}"></div>
    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <div class="email-display">
        📧 OTP sent to: <strong th:text="${email}"></strong>
    </div>

    <div class="timer" id="timer">⏱ OTP expires in: <span id="countdown">10:00</span></div>

    <form action="/verify-otp" method="post" id="otpForm">
        <input type="hidden" name="email" th:value="${email}">
        <input type="hidden" name="otp" id="otpHidden">

        <div class="otp-group">
            <input type="text" class="otp-input" maxlength="1" id="d1">
            <input type="text" class="otp-input" maxlength="1" id="d2">
            <input type="text" class="otp-input" maxlength="1" id="d3">
            <input type="text" class="otp-input" maxlength="1" id="d4">
            <input type="text" class="otp-input" maxlength="1" id="d5">
            <input type="text" class="otp-input" maxlength="1" id="d6">
        </div>

        <button type="submit" class="btn" onclick="combineOtp()">Verify OTP →</button>
    </form>

    <a href="/forgot-password" class="resend-link">↻ Resend OTP</a>
    <a href="/login" class="back-link">← Back to Login</a>
</div>

<script>
    // Auto-focus next input
    const inputs = document.querySelectorAll('.otp-input');
    inputs.forEach((input, i) => {
        input.addEventListener('input', () => {
            if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
        });
        // Only allow numbers
        input.addEventListener('keypress', (e) => {
            if (!/[0-9]/.test(e.key)) e.preventDefault();
        });
    });

    // Combine 6 digits into hidden input
    function combineOtp() {
        const otp = Array.from(inputs).map(i => i.value).join('');
        document.getElementById('otpHidden').value = otp;
    }

    // Countdown timer (10 minutes)
    let seconds = 600;
    const countdownEl = document.getElementById('countdown');
    const interval = setInterval(() => {
        seconds--;
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        countdownEl.textContent = m + ':' + s;
        if (seconds <= 0) {
            clearInterval(interval);
            countdownEl.textContent = 'EXPIRED';
            countdownEl.style.color = '#f87171';
        }
    }, 1000);
</script>
</body>
</html>
