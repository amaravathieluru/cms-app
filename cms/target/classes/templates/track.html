<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Track Complaint – CMS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #0a1628; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; }
        .bg-pattern { position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 70% 50% at 30% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
            linear-gradient(160deg, #0a1628 0%, #0d1e3a 50%, #0a1628 100%); }
        .bg-grid { position: fixed; inset: 0; z-index: 0;
            background-image: linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
            background-size: 60px 60px; }

        .card { position: relative; z-index: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.18); border-radius: 24px; padding: 48px 40px; max-width: 440px; width: 90%; animation: fadeUp 0.5s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .icon-wrap { width: 56px; height: 56px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 24px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 32px; }
        .divider { width: 40px; height: 2px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); margin: 0 auto 32px; }

        label { display: block; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
        .input-wrap { position: relative; margin-bottom: 20px; }
        .input-wrap span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.5; }
        input[type="text"] { width: 100%; padding: 13px 14px 13px 42px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        input::placeholder { color: rgba(255,255,255,0.22); }
        input:focus { border-color: rgba(201,168,76,0.45); box-shadow: 0 0 0 3px rgba(201,168,76,0.07); }

        .btn-track { width: 100%; padding: 14px; background: linear-gradient(135deg, #c9a84c, #e8c96e); border: none; border-radius: 10px; color: #1a1200; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
        .btn-track:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.25); }

        .back-link { display: block; text-align: center; margin-top: 18px; color: rgba(255,255,255,0.3); font-size: 0.82rem; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: #c9a84c; }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-grid"></div>
<div class="card">
    <div class="icon-wrap">🔍</div>
    <h2>Track Complaint</h2>
    <p class="subtitle">Enter your roll number to view your complaint status</p>
    <div class="divider"></div>
    <form action="/track" method="post">
        <label>Roll Number</label>
        <div class="input-wrap">
            <span>🎓</span>
            <input type="text" name="rollNumber" placeholder="e.g. 22BC1A0501" required>
        </div>
        <button type="submit" class="btn-track">Track Status →</button>
    </form>
    <a href="/" class="back-link">← Back to Home</a>
</div>
</body>
</html>
