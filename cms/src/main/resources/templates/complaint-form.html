<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Submit Complaint – CMS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #0a1628; --navy2: #112240; --gold: #c9a84c; --gold-light: #e8c96e;
            --text-muted: #8a9bb5; --white: #fff;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--white); padding: 40px 20px; }

        .bg-pattern { position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 60%),
            linear-gradient(160deg, #0a1628 0%, #0d1e3a 50%, #0a1628 100%); }
        .bg-grid { position: fixed; inset: 0; z-index: 0;
            background-image: linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
            background-size: 60px 60px; }

        .card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.18);
            border-radius: 24px; padding: 48px 44px; width: 100%; max-width: 500px;
            backdrop-filter: blur(20px); box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            animation: fadeUp 0.6s ease both;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

        .icon-wrap { width: 56px; height: 56px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.28); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 24px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; text-align: center; margin-bottom: 6px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.84rem; margin-bottom: 12px; }
        .divider { width: 40px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 auto 32px; }

        .field { margin-bottom: 22px; }
        label { display: block; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }

        .input-wrap { position: relative; }
        .input-wrap .ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.45; pointer-events: none; }
        .input-wrap.textarea-wrap .ico { top: 16px; transform: none; }

        input[type="text"], textarea {
            width: 100%; padding: 13px 14px 13px 42px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
            border-radius: 10px; color: var(--white); font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        textarea { padding-top: 13px; resize: vertical; min-height: 120px; line-height: 1.6; }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
        input:focus, textarea:focus {
            border-color: rgba(201,168,76,0.45);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.07);
            background: rgba(255,255,255,0.07);
        }

        /* Character counter */
        .char-count { font-size: 0.72rem; color: var(--text-muted); text-align: right; margin-top: 5px; }

        .btn-submit {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none; border-radius: 10px; color: #1a1200;
            font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; letter-spacing: 0.04em; transition: all 0.2s; margin-top: 6px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(201,168,76,0.28); }
        .btn-submit:active { transform: translateY(0); }

        .note { display: flex; align-items: flex-start; gap: 10px; background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.15); border-radius: 10px; padding: 12px 14px; margin-bottom: 24px; }
        .note-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }
        .note-text { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }

        .back-link { display: block; text-align: center; margin-top: 18px; color: var(--text-muted); font-size: 0.82rem; text-decoration: none; transition: color 0.2s; position: relative; z-index: 1; }
        .back-link:hover { color: var(--gold-light); }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-grid"></div>

<div class="card">
    <div class="icon-wrap">📝</div>
    <h2>Submit Complaint</h2>
    <p class="subtitle">Raise your grievance — we'll make sure it reaches the right person</p>
    <div class="divider"></div>

    <div class="note">
        <span class="note-icon">ℹ️</span>
        <span class="note-text">Your complaint will be forwarded to your HOD for review. Please describe your issue clearly and accurately.</span>
    </div>

    <form th:action="@{/submitComplaint}" th:object="${complaint}" method="post">

        <div class="field">
            <label>Student Name</label>
            <div class="input-wrap">
                <span class="ico">👤</span>
                <input type="text" th:field="*{studentName}" placeholder="Enter your full name" required />
            </div>
        </div>

        <div class="field">
            <label>Roll Number</label>
            <div class="input-wrap">
                <span class="ico">🎓</span>
                <input type="text" th:field="*{rollNumber}" placeholder="e.g. 22BC1A0501" required />
            </div>
        </div>

        <div class="field">
            <label>Complaint Details</label>
            <div class="input-wrap textarea-wrap">
                <span class="ico">✍️</span>
                <textarea th:field="*{complaintText}" placeholder="Describe your complaint in detail..." required maxlength="500" id="complaintText"></textarea>
            </div>
            <div class="char-count"><span id="charCount">0</span> / 500</div>
        </div>

        <button type="submit" class="btn-submit">Submit Complaint →</button>
    </form>
</div>

<a href="/" class="back-link">← Back to Home</a>

<script>
    const ta = document.getElementById('complaintText');
    const cc = document.getElementById('charCount');
    if (ta && cc) {
        ta.addEventListener('input', () => { cc.textContent = ta.value.length; });
    }
</script>
</body>
</html>
