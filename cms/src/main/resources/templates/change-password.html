<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password – CMS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #071a0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; padding: 20px; }
        .bg-pattern { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 70% 50% at 50% 20%, rgba(46,204,113,0.08) 0%, transparent 60%), linear-gradient(160deg, #071a0f 0%, #0d2818 50%, #071a0f 100%); }
        .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(46,204,113,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(46,204,113,0.04) 1px, transparent 1px); background-size: 50px 50px; }
        .card { position: relative; z-index: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(74,222,128,0.18); border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 440px; backdrop-filter: blur(20px); box-shadow: 0 30px 80px rgba(0,0,0,0.4); animation: fadeUp 0.6s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
        .icon-wrap { width: 56px; height: 56px; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.28); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 20px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; text-align: center; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #7aab8a; font-size: 0.84rem; margin-bottom: 12px; }
        .divider { width: 40px; height: 2px; background: linear-gradient(90deg, transparent, #4ade80, transparent); margin: 0 auto 28px; }
        .error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: #f87171; border-radius: 10px; padding: 11px 14px; font-size: 0.82rem; margin-bottom: 20px; text-align: center; }
        .field { margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #7aab8a; margin-bottom: 8px; }
        .input-wrap { position: relative; }
        .input-wrap span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.4; pointer-events: none; }
        .toggle-eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 15px; opacity: 0.5; background: none; border: none; color: #fff; }
        input[type="password"], input[type="text"] { width: 100%; padding: 13px 40px 13px 42px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; transition: border-color 0.2s; }
        input::placeholder { color: rgba(255,255,255,0.2); }
        input:focus { border-color: rgba(74,222,128,0.4); box-shadow: 0 0 0 3px rgba(74,222,128,0.07); }
        .strength-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); margin-top: 8px; }
        .strength-fill { height: 100%; width: 0%; border-radius: 2px; transition: all 0.3s; }
        .strength-label { font-size: 0.72rem; color: #7aab8a; margin-top: 4px; }
        .match-indicator { font-size: 0.75rem; margin-top: 6px; }
        .match-ok { color: #4ade80; }
        .match-no { color: #f87171; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #1a7a4a, #4ade80); border: none; border-radius: 10px; color: #071a0f; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(74,222,128,0.25); }
        .back-link { display: block; text-align: center; margin-top: 18px; color: #7aab8a; font-size: 0.82rem; text-decoration: none; }
        .back-link:hover { color: #4ade80; }
        .section-sep { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 22px 0; }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-grid"></div>
<div class="card">
    <div class="icon-wrap">🔐</div>
    <h2>Change Password</h2>
    <p class="subtitle">Update your account password securely</p>
    <div class="divider"></div>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form action="/change-password" method="post">

        <div class="field">
            <label>Current Password</label>
            <div class="input-wrap">
                <span>🔑</span>
                <input type="password" name="currentPassword" id="curPass" placeholder="Enter current password" required>
                <button type="button" class="toggle-eye" onclick="toggleVisibility('curPass', this)">👁</button>
            </div>
        </div>

        <hr class="section-sep">

        <div class="field">
            <label>New Password</label>
            <div class="input-wrap">
                <span>✨</span>
                <input type="password" name="newPassword" id="newPass" placeholder="Min 6 characters" required minlength="6" oninput="checkStrength(this.value)">
                <button type="button" class="toggle-eye" onclick="toggleVisibility('newPass', this)">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="field">
            <label>Confirm New Password</label>
            <div class="input-wrap">
                <span>✨</span>
                <input type="password" name="confirmPassword" id="confirmPass" placeholder="Repeat new password" required oninput="checkMatch()">
                <button type="button" class="toggle-eye" onclick="toggleVisibility('confirmPass', this)">👁</button>
            </div>
            <div class="match-indicator" id="matchIndicator"></div>
        </div>

        <button type="submit" class="btn">Update Password →</button>
    </form>
    <a href="/student-dashboard" class="back-link">← Back to Dashboard</a>
</div>

<script>
    function toggleVisibility(id, btn) {
        const input = document.getElementById(id);
        if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
        else { input.type = 'password'; btn.textContent = '👁'; }
    }
    function checkStrength(val) {
        const fill = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        let s = 0;
        if (val.length >= 6) s++;
        if (val.length >= 10) s++;
        if (/[A-Z]/.test(val)) s++;
        if (/[0-9]/.test(val)) s++;
        if (/[^A-Za-z0-9]/.test(val)) s++;
        fill.style.width = (s / 5 * 100) + '%';
        if (s <= 2) { fill.style.background = '#f87171'; label.textContent = 'Weak'; label.style.color = '#f87171'; }
        else if (s <= 3) { fill.style.background = '#fbbf24'; label.textContent = 'Medium'; label.style.color = '#fbbf24'; }
        else { fill.style.background = '#4ade80'; label.textContent = 'Strong'; label.style.color = '#4ade80'; }
    }
    function checkMatch() {
        const np = document.getElementById('newPass').value;
        const cp = document.getElementById('confirmPass').value;
        const el = document.getElementById('matchIndicator');
        if (!cp) { el.textContent = ''; return; }
        if (np === cp) { el.textContent = '✓ Passwords match'; el.className = 'match-indicator match-ok'; }
        else { el.textContent = '✗ Passwords do not match'; el.className = 'match-indicator match-no'; }
    }
</script>
</body>
</html>
