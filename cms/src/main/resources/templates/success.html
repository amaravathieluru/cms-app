<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Complaint Submitted – CMS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #071a0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; }
        .bg-pattern { position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(46,204,113,0.08) 0%, transparent 60%),
            linear-gradient(160deg, #071a0f 0%, #0d2818 50%, #071a0f 100%); }
        .bg-grid { position: fixed; inset: 0; z-index: 0;
            background-image: linear-gradient(rgba(46,204,113,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(46,204,113,0.04) 1px, transparent 1px);
            background-size: 50px 50px; }

        .card { position: relative; z-index: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(74,222,128,0.2); border-radius: 24px; padding: 56px 48px; max-width: 460px; width: 90%; text-align: center; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
        @keyframes pop { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }

        .success-ring { width: 80px; height: 80px; background: rgba(74,222,128,0.1); border: 2px solid rgba(74,222,128,0.35); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 24px; animation: ring 0.6s 0.3s ease both; }
        @keyframes ring { from { opacity:0; transform:scale(0.5) rotate(-20deg); } to { opacity:1; transform:scale(1) rotate(0); } }

        h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; margin-bottom: 10px; }
        p { color: rgba(255,255,255,0.5); font-size: 0.88rem; line-height: 1.6; margin-bottom: 36px; }

        .divider { width: 40px; height: 2px; background: linear-gradient(90deg, transparent, #4ade80, transparent); margin: 0 auto 32px; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { display: block; padding: 13px 20px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
        .btn-primary-g { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; }
        .btn-primary-g:hover { background: rgba(74,222,128,0.2); transform: translateY(-2px); }
        .btn-secondary-g { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
        .btn-secondary-g:hover { background: rgba(255,255,255,0.08); }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-grid"></div>
<div class="card">
    <div class="success-ring">✅</div>
    <h2>Complaint Submitted!</h2>
    <div class="divider"></div>
    <p>Your complaint has been successfully recorded and forwarded to the HOD for review. You can track its status using your roll number.</p>
    <div class="btn-group">
        <a href="/complaint" class="btn btn-primary-g">📝 Submit Another Complaint</a>
        <a href="/track" class="btn btn-secondary-g">🔍 Track My Complaint</a>
    </div>
</div>
</body>
</html>
