<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password – CMS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #0a1628; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; padding: 20px; }
        .bg-pattern { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 60%), linear-gradient(160deg, #0a1628 0%, #0d1e3a 50%, #0a1628 100%); }
        .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px); background-size: 60px 60px; }
        .card { position: relative; z-index: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2); border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; backdrop-filter: blur(20px); box-shadow: 0 30px 80px rgba(0,0,0,0.4); animation: fadeUp 0.6s ease both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
        .icon-wrap { width: 56px; height: 56px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.28); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 20px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; text-align: center; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #8a9bb5; font-size: 0.84rem; margin-bottom: 12px; }
        .divider { width: 40px; height: 2px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); margin: 0 auto 28px; }
        .error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: #f87171; border-radius: 10px; padding: 11px 14px; font-size: 0.82rem; margin-bottom: 20px; text-align: center; }
        label { display: block; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #8a9bb5; margin-bottom: 8px; }
        .input-wrap { position: relative; margin-bottom: 20px; }
        .input-wrap span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.45; }
        input[type="email"] { width: 100%; padding: 13px 14px 13px 42px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; transition: border-color 0.2s; }
        input::placeholder { color: rgba(255,255,255,0.2); }
        input:focus { border-color: rgba(201,168,76,0.45); box-shadow: 0 0 0 3px rgba(201,168,76,0.07); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #c9a84c, #e8c96e); border: none; border-radius: 10px; color: #1a1200; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(201,168,76,0.28); }
        .back-link { display: block; text-align: center; margin-top: 18px; color: #8a9bb5; font-size: 0.82rem; text-decoration: none; }
        .back-link:hover { color: #e8c96e; }
        .info-box { background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.15); border-radius: 10px; padding: 12px 14px; margin-bottom: 24px; font-size: 0.78rem; color: #8a9bb5; line-height: 1.5; }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-grid"></div>
<div class="card">
    <div class="icon-wrap">🔑</div>
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your registered email to receive an OTP</p>
    <div class="divider"></div>

    <div class="info-box">ℹ️ A 6-digit OTP will be sent to your registered email address.</div>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form action="/forgot-password" method="post">
        <label>Registered Email</label>
        <div class="input-wrap">
            <span>📧</span>
            <input type="email" name="email" placeholder="yourname@email.com" required>
        </div>
        <button type="submit" class="btn">Send OTP →</button>
    </form>
    <a href="/login" class="back-link">← Back to Login</a>
</div>
</body>
</html>
